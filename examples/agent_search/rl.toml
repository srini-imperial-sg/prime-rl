max_steps = 1000
seq_len = 2048


[deployment]
num_infer_gpus = 1
num_train_gpus = 1


[model]
name = "Qwen/Qwen3-4B-Instruct-2507"


[wandb]
project = "rl_srini_2026"
name = "agent_search_3_tools_qwen_instruct"

[trainer.optim]
lr=1e-5
weight_decay=0.0

[trainer.model.lora]
rank = 16
dropout = 0.0
target_modules = [
    "q_proj",
    "k_proj",
    "v_proj",
    "o_proj",
    "gate_proj",
    "up_proj",
    "down_proj"
]

[orchestrator]
batch_size = 6
rollouts_per_example = 6
oversampling_factor = 2.0

[orchestrator.client]
timeout = 120

[orchestrator.model.lora]
name = "qwen3-4b-agent_search"

[orchestrator.sampling]
max_tokens = 512

[orchestrator.buffer]
online_difficulty_filtering = true

[[orchestrator.env]]
id = "agent_search"
args = { judge_model = "hugging-quants/Meta-Llama-3.1-70B-Instruct-AWQ-INT4", judge_base_url = "http://localhost:6379/v1", judge_api_key = "abc"}

[ckpt] # Checkpoint at the end of training



[inference.model]
tool_call_parser = "hermes"
max_model_len = 8192
